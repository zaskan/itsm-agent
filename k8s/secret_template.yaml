# LiteLLM + demo-chat + itsm MCP. Replace REPLACE_ME before apply.
#
# CHAT_* / CHANNEL_* : demo-chat bot user and channel
# ITSM_BASE_URL      : itsm-app origin; MCP is {ITSM_BASE_URL}/mcp/
# ITSM_MCP_TOKEN     : same as itsm-secrets mcp-token when MCP is protected (empty if open)
# LLM_BASE_URL       : LiteLLM base, with or without trailing /v1, e.g.
#                      https://litellm-prod.apps.example.com/v1
# LLM_MODEL          : e.g. llama-scout-17b
# LLM_API_KEY        : LiteLLM Bearer key
#
# AAP Controller REST (optional): template lookup, launch, and job poll — no aap-mcp-server required.
# AAP_CONTROLLER_API_URL : full REST base — AAP 2.6+: https://ansible-aap.apps.../api/controller/v2 (do not append /api/v2)
# AAP_API_TOKEN          : Bearer OAuth2 token (or set AAP_MCP_TOKEN only — used as fallback)
# AAP_CONTROLLER_UI_URL  : optional; UI origin for job output links when API omits html_url
# AAP_JOB_POLL_INTERVAL_SEC / AAP_JOB_POLL_TIMEOUT_SEC : optional poll tuning
# AAP_TLS_VERIFY         : optional; set "false" for self-signed HTTPS (lab only)
apiVersion: v1
kind: Secret
metadata:
  name: itsm-agent-secrets
  namespace: itsm-agent
  labels:
    app: itsm-agent
type: Opaque
stringData:
  CHAT_BASE_URL: "http://demo-chat.demo-chat.svc.cluster.local:8000"
  CHAT_USERNAME: ""
  CHAT_PASSWORD: ""
  CHANNEL_NAME: ""
  ITSM_BASE_URL: "http://itsm-app.itsm-app.svc.cluster.local:8000"
  ITSM_MCP_TOKEN: ""
  LLM_BASE_URL: "https://yourllm/v1"
  LLM_MODEL: ""
  LLM_API_KEY: ""
  AAP_CONTROLLER_API_URL: ""
  AAP_API_TOKEN: ""
  AAP_MCP_TOKEN: ""
