# LiteLLM + demo-chat + itsm MCP. Replace REPLACE_ME before apply.
#
# CHAT_* / CHANNEL_* : demo-chat bot user and channel
# ITSM_BASE_URL      : itsm-app origin; MCP is {ITSM_BASE_URL}/mcp/
# ITSM_MCP_TOKEN     : same as itsm-secrets mcp-token when MCP is protected (empty if open)
# LLM_BASE_URL       : LiteLLM base, with or without trailing /v1, e.g.
#                      https://litellm-prod.apps.example.com/v1
# LLM_MODEL          : e.g. llama-scout-17b
# LLM_API_KEY        : LiteLLM Bearer key
#
# AAP MCP (optional): same pattern as Cursor mcpServers — only base URL + token here.
# The bot enables all six toolset endpoints by default:
#   {AAP_MCP_BASE_URL}/job_management/mcp
#   {AAP_MCP_BASE_URL}/inventory_management/mcp
#   {AAP_MCP_BASE_URL}/system_monitoring/mcp
#   {AAP_MCP_BASE_URL}/user_management/mcp
#   {AAP_MCP_BASE_URL}/security_compliance/mcp
#   {AAP_MCP_BASE_URL}/platform_configuration/mcp
# Template verification uses job_management only; other URLs are ready for future tools.
# AAP_MCP_BASE_URL   : e.g. https://api.example.com (no trailing path)
# AAP_MCP_TOKEN      : Bearer token sent as Authorization on every AAP MCP request
# AAP_TLS_VERIFY     : optional; set string "false" for AAP MCP HTTPS only (self-signed / lab; insecure)
apiVersion: v1
kind: Secret
metadata:
  name: itsm-agent-secrets
  namespace: itsm-agent
  labels:
    app: itsm-agent
type: Opaque
stringData:
  CHAT_BASE_URL: "http://demo-chat.demo-chat.svc.cluster.local:8000"
  CHAT_USERNAME: ""
  CHAT_PASSWORD: ""
  CHANNEL_NAME: ""
  ITSM_BASE_URL: "http://itsm-app.itsm-app.svc.cluster.local:8000"
  ITSM_MCP_TOKEN: ""
  LLM_BASE_URL: "https://yourllm/v1"
  LLM_MODEL: ""
  LLM_API_KEY: ""
  AAP_MCP_BASE_URL: ""
  AAP_MCP_TOKEN: ""
