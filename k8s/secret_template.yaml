# LiteLLM + demo-chat + itsm MCP + AAP MCP. Replace REPLACE_ME before apply.
#
# CHAT_* / CHANNEL_* : demo-chat bot user and channel
# ITSM_BASE_URL      : itsm-app origin; MCP is {ITSM_BASE_URL}/mcp/
# ITSM_MCP_TOKEN     : same as itsm-secrets mcp-token when MCP is protected (empty if open)
# LLM_BASE_URL       : LiteLLM base, with or without trailing /v1
# LLM_MODEL          : e.g. llama-scout-17b
# LLM_API_KEY        : LiteLLM Bearer key
#
# AAP MCP (optional): template resolve, launch, and job poll via MCP gateway
# AAP_MCP_BASE_URL   : e.g. https://ansible-mcp-aap.apps.example.com
# AAP_MCP_TOKEN      : Bearer token for AAP MCP
# AAP_CONTROLLER_UI_URL : optional UI origin for job output links
# AAP_JOB_POLL_INTERVAL_SEC / AAP_JOB_POLL_TIMEOUT_SEC : optional poll tuning
# AAP_TLS_VERIFY     : optional; set "false" for self-signed HTTPS (lab only)
#
# Ansible Lightspeed incident remediation (optional)
# AAP_LIGHTSPEED_WORKFLOW              : workflow template name (default Lightspeed Remediation)
# AAP_LIGHTSPEED_API_URL                 : playbook generation endpoint
# AAP_LIGHTSPEED_API_TOKEN               : Bearer token for Lightspeed API
# AAP_LIGHTSPEED_TLS_VERIFY              : optional; default "true"
# AAP_LIGHTSPEED_ALLOW_LITELLM_FALLBACK  : optional; default "true"
# AAP_APACHE_TROUBLESHOOT_JT             : job template for Apache troubleshoot path
# ITSM_KB_APACHE_TROUBLESHOOT_TITLE      : KB title for Apache troubleshoot routing
apiVersion: v1
kind: Secret
metadata:
  name: itsm-agent-secrets
  namespace: itsm-agent
  labels:
    app: itsm-agent
type: Opaque
stringData:
  CHAT_BASE_URL: "http://demo-chat.demo-chat.svc.cluster.local:8000"
  CHAT_USERNAME: ""
  CHAT_PASSWORD: ""
  CHANNEL_NAME: ""
  ITSM_BASE_URL: "http://itsm-app.itsm-app.svc.cluster.local:8000"
  ITSM_MCP_TOKEN: ""
  LLM_BASE_URL: "https://yourllm/v1"
  LLM_MODEL: ""
  LLM_API_KEY: ""
  AAP_MCP_BASE_URL: ""
  AAP_MCP_TOKEN: ""
  AAP_CONTROLLER_UI_URL: ""
  AAP_TLS_VERIFY: "true"
  AAP_LIGHTSPEED_WORKFLOW: ""
  AAP_LIGHTSPEED_API_URL: ""
  AAP_LIGHTSPEED_API_TOKEN: ""
  AAP_LIGHTSPEED_TLS_VERIFY: "true"
  AAP_LIGHTSPEED_ALLOW_LITELLM_FALLBACK: "true"
  AAP_APACHE_TROUBLESHOOT_JT: ""
  ITSM_KB_APACHE_TROUBLESHOOT_TITLE: ""
